# =============================================================================
# minimal tmux.conf — a, b, c only
#   a) prefix = Ctrl+Space
#   b) bindings: n (new window), - (split down), = (split right)
#   c) status bar with grey monochrome segments
#
# how to activate:
#   rm ~/.config/tmux/tmux.conf            # removes oh-my-tmux symlink
#   mv ~/.config/tmux/tmux.conf.minimal ~/.config/tmux/tmux.conf
#   tmux kill-server                       # restart tmux to apply
# =============================================================================


# -- (a) prefix ---------------------------------------------------------------
# tmux's default prefix is C-b. We replace it with C-Space.
# `set -g` sets a global option. `unbind` removes a key binding.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix          # press prefix twice → send literal C-Space


# -- (b) custom key bindings --------------------------------------------------
# `bind <key> <command>` defines a prefix-key binding.
# `-c '#{pane_current_path}'` makes the new pane/window inherit the cwd.
unbind '"'                        # default horizontal split
unbind %                          # default vertical split
unbind n                          # default next-window (we repurpose n)

bind n new-window     -c '#{pane_current_path}'   # prefix + n  → new window
bind - split-window -v -c '#{pane_current_path}'  # prefix + -  → split down
bind = split-window -h -c '#{pane_current_path}'  # prefix + =  → split right

# convenience: reload this config without restarting tmux
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"


# -- (c) status bar -----------------------------------------------------------
# tmux's status bar has: status-left | window-list | status-right
# Each segment is a string with `#[fg=...,bg=...]` inline style tokens and
# `#{...}` format variables (e.g. #S = session name, #I = window index).

set -g status on
set -g status-position bottom
set -g status-interval 5                       # refresh seconds
set -g status-justify left                     # window-list alignment
set -g status-style "bg=#080808,fg=#8a8a8a"    # bar background + default fg

# left: [ 󰆚 session-name ][ ↑ uptime ]
# `#(...)` runs a shell command; here we read uptime via the `uptime` cmd.
set -g status-left-length 60
set -g status-left "\
#[bg=#3a3a3a,fg=#d0d0d0,bold] 󰆚 #S \
#[bg=#4e4e4e,fg=#bcbcbc,nobold] ↑ #(uptime | sed -E 's/.*up *([^,]+),.*/\\1/') "

# right: [ prefix? ][ time ][ date ][ hostname ]
# #{?client_prefix,A,B} = show A when prefix has been pressed, else B.
# ⌨ (U+2328) is the keyboard icon — same indicator oh-my-tmux used upstream.
# %R = HH:MM, %d %b = "13 May", #h = short hostname
set -g status-right-length 80
set -g status-right "\
#{?client_prefix,#[bg=#1c1c1c#,fg=#d0d0d0#,bold] ⌨ ,}\
#[bg=#4e4e4e,fg=#bcbcbc,nobold] %R \
#[bg=#3a3a3a,fg=#d0d0d0] %d %b \
#[bg=#626262,fg=#eeeeee,bold] #h "

# window list: inactive vs active (the active window is the "segment 3" grey)
setw -g window-status-format         "#[fg=#8a8a8a,bg=#080808] #I #W "
setw -g window-status-current-format "#[fg=#eeeeee,bg=#626262,bold] #I #W "
setw -g window-status-separator ""             # no gap between window entries

set -g mouse on
